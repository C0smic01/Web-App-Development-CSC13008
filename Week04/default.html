<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé tập tính</title>
    <link rel="stylesheet" href="default.css">
</head>
<body>
    <div class="container">
        <h2>Bé tập tính</h2>
        <div class="form-row">
            <div class="form-label"><label for="num1">Số thứ nhất:</label></div>
            <div class="form-input"><input type="text" id="num1"></div>
            <div class="form-operations">
                <label><input type="radio" name="operation" value="add"> Cộng</label>
                <label><input type="radio" name="operation" value="subtract"> Trừ</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-label"><label for="num2">Số thứ hai:</label></div>
            <div class="form-input"><input type="text" id="num2"></div>
            <div class="form-operations">
                <label><input type="radio" name="operation" value="multiply"> Nhân</label>
                <label><input type="radio" name="operation" value="divide"> Chia</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-label"><label for="result">Kết quả:</label></div>
            <div class="form-input"><input type="text" id="result" readonly></div>
            <button class="calculate-btn" id="calculate-btn">Tính</button>
        </div>

        <div id="notification"></div>
    </div>

    <script src="default.js"></script>
</body>
</html>
